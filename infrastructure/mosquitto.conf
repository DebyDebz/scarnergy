# ============================================================
# Scarnergy — Mosquitto MQTT Broker Configuration
# ============================================================

# Standard MQTT port
listener 1883
protocol mqtt

# MQTT over WebSocket (for browser clients)
listener 9001
protocol websockets

# Allow anonymous connections in development
# PRODUCTION: set allow_anonymous false and configure password_file
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections 500
max_keepalive 120

# Message size limit (1MB — large enough for batch payloads)
message_size_limit 1048576

# Queue messages for offline clients (QoS 1 & 2)
max_queued_messages 1000
