_format_version: "2.1"
_transform: true

services:
  - name: scarnergy-auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true

  - name: scarnergy-rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest
        strip_path: true

  - name: scarnergy-realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime
        strip_path: true

  - name: scarnergy-meta
    url: http://meta:8080
    routes:
      - name: meta-route
        paths:
          - /meta
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
        - X-Requested-With
        - X-CSRF-Token
        - apikey
        - x-client-info
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 86400

  - name: key-auth
    config:
      key_names:
        - apikey
        - api_key
        - ApiKey
        - Authorization
      key_in_header: true
      key_in_query: true
      key_in_body: false
      hide_credentials: true
      anonymous: anon

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7ACcPjLjK9CkOs8hL32t6nO2E-pUaF5Gp3A}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0}