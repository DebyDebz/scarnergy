[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
  h2zero/NimBLE-Arduino @ ^1.4.1
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0.4

build_flags =
  -DCONFIG_BT_NIMBLE_ENABLED=1
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1

monitor_speed  = 115200
upload_speed   = 921600
